<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客验证 - 顺意H5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            opacity: 0.5;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 50px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            max-width: 450px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .label {
            display: block;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            text-align: left;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: left;
        }

        .error-message.show {
            opacity: 1;
        }

        .input-wrapper.error input {
            border-color: #ff6b6b;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .btn {
            width: 100%;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="glass-card">
            <h1 class="title">✨ 欢迎来访 ✨</h1>
            <p class="subtitle">请输入访客CN以继续</p>
            
            <form id="verifyForm">
                <div class="form-group">
                    <label class="label">访客CN</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="visitorInput" 
                            placeholder="请输入访客CN..."
                            autocomplete="off"
                        >
                        <div class="error-message" id="errorMsg">访客不正确，请重试</div>
                    </div>
                </div>
                <button type="submit" class="btn">进入页面</button>
            </form>
        </div>
    </div>

    <script>
        // 创建浮动粒子背景
        function createParticles() {
            const background = document.querySelector('.background');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 60 + 20;
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                const duration = Math.random() * 20 + 10;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = `rgba(255, 255, 255, ${Math.random() * 0.3 + 0.1})`;
                particle.style.animation = `float ${duration}s linear infinite`;
                
                background.appendChild(particle);
            }

            // 添加浮动动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes float {
                    0% {
                        transform: translateY(0) translateX(0);
                        opacity: 0;
                    }
                    10% {
                        opacity: 0.5;
                    }
                    90% {
                        opacity: 0.5;
                    }
                    100% {
                        transform: translateY(-${window.innerHeight + 100}px) translateX(${(Math.random() - 0.5) * 100}px);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
        }

        // 表单验证
        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const input = document.getElementById('visitorInput');
            const inputWrapper = input.parentElement;
            const errorMsg = document.getElementById('errorMsg');
            
            const value = input.value.trim();
            
            if (value === '顺意') {
                // 验证成功
                inputWrapper.classList.remove('error');
                errorMsg.classList.remove('show');
                
                // 延迟跳转以显示成功反馈
                setTimeout(() => {
                    window.location.href = 'birthday.html';
                }, 300);
            } else {
                // 验证失败
                inputWrapper.classList.add('error');
                errorMsg.classList.add('show');
                input.value = '';
            }
        });

        // 初始化粒子背景
        window.addEventListener('load', createParticles);
    </script>
</body>
</html>
